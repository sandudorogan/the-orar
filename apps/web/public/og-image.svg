<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a2039"/>
      <stop offset="100%" stop-color="#1e4d78"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Subtle grid pattern (timetable motif) -->
  <g stroke="#4680b0" stroke-width="0.5" opacity="0.15">
    <line x1="200" y1="0" x2="200" y2="630"/>
    <line x1="400" y1="0" x2="400" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="800" y1="0" x2="800" y2="630"/>
    <line x1="1000" y1="0" x2="1000" y2="630"/>
    <line x1="0" y1="126" x2="1200" y2="126"/>
    <line x1="0" y1="252" x2="1200" y2="252"/>
    <line x1="0" y1="378" x2="1200" y2="378"/>
    <line x1="0" y1="504" x2="1200" y2="504"/>
  </g>

  <!-- Accent cells -->
  <rect x="401" y="253" width="198" height="124" rx="4" fill="#4680b0" opacity="0.2"/>
  <rect x="601" y="127" width="198" height="124" rx="4" fill="#4680b0" opacity="0.15"/>
  <rect x="801" y="379" width="198" height="124" rx="4" fill="#4680b0" opacity="0.1"/>

  <!-- Logo icon -->
  <g transform="translate(80, 230)">
    <rect width="64" height="64" rx="12" fill="#4680b0"/>
    <g fill="none" stroke="#fafaf9" stroke-width="2.5" stroke-linecap="round">
      <line x1="16" y1="20" x2="48" y2="20"/>
      <line x1="16" y1="32" x2="48" y2="32"/>
      <line x1="16" y1="44" x2="48" y2="44"/>
      <line x1="24" y1="14" x2="24" y2="50"/>
      <line x1="36" y1="14" x2="36" y2="50"/>
    </g>
    <rect x="26" y="22" width="8" height="8" rx="1" fill="#fafaf9" opacity="0.5"/>
  </g>

  <!-- Title -->
  <text x="170" y="265" font-family="system-ui, -apple-system, sans-serif" font-size="72" font-weight="700" fill="#fafaf9">Orar</text>

  <!-- Subtitle -->
  <text x="80" y="340" font-family="system-ui, -apple-system, sans-serif" font-size="32" font-weight="400" fill="#a8c8e1">School scheduling, solved.</text>

  <!-- Description -->
  <text x="80" y="400" font-family="system-ui, -apple-system, sans-serif" font-size="20" fill="#8494a8">Build conflict-free timetables entirely in your browser.</text>
  <text x="80" y="430" font-family="system-ui, -apple-system, sans-serif" font-size="20" fill="#8494a8">No servers, no accounts, no hassle.</text>

  <!-- URL -->
  <text x="80" y="560" font-family="system-ui, -apple-system, sans-serif" font-size="18" fill="#6b7d93">sandudorogan.github.io/the-orar</text>
</svg>
